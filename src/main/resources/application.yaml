server:
  port: 8080

spring:
  application:
    name: assistencia-tecnica
  datasource:
    url: jdbc:postgresql://localhost:5432/assistencia_tecnica
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

